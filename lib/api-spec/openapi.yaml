openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CorruptionFreeTN API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: masterdata
    description: Tamil Nadu administrative master data
  - name: complaints
    description: Complaint operations
  - name: stats
    description: Public statistics
  - name: users
    description: User operations
  - name: rti
    description: RTI (Right to Information) requests
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: admin
    description: Admin and officer operations
  - name: dashboard
    description: Role-scoped dashboard views
  - name: notifications
    description: In-app notifications
paths:
  /health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /districts:
    get:
      operationId: listDistricts
      tags: [masterdata]
      summary: List all Tamil Nadu districts
      responses:
        "200":
          description: List of districts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/District"
  /districts/{districtId}/taluks:
    get:
      operationId: listTaluksByDistrict
      tags: [masterdata]
      summary: List taluks in a district
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of taluks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Taluk"
        "404":
          description: District not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /taluks:
    get:
      operationId: listTaluks
      tags: [masterdata]
      summary: List all taluks, optionally filtered by district
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of taluks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Taluk"
  /blocks:
    get:
      operationId: listBlocks
      tags: [masterdata]
      summary: List blocks, optionally filtered by district or taluk
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
        - name: talukId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Block"
  /offices:
    get:
      operationId: listOffices
      tags: [masterdata]
      summary: List government offices, optionally filtered
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of offices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Office"
  /ministries:
    get:
      operationId: listMinistries
      tags: [masterdata]
      summary: List all ministries
      responses:
        "200":
          description: List of ministries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ministry"
  /departments:
    get:
      operationId: listDepartments
      tags: [masterdata]
      summary: List all government departments
      parameters:
        - name: ministryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
  /complaint-categories:
    get:
      operationId: listComplaintCategories
      tags: [masterdata]
      summary: List all complaint categories
      responses:
        "200":
          description: List of complaint categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplaintCategory"
  /stats/public:
    get:
      operationId: getPublicStats
      tags: [stats]
      summary: Public transparency statistics
      responses:
        "200":
          description: Public statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStats"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get the current authenticated user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints:
    get:
      operationId: listComplaints
      tags: [complaints]
      summary: List complaints (public, redacted)
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
    post:
      operationId: createComplaint
      tags: [complaints]
      summary: Submit a new complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintInput"
      responses:
        "201":
          description: Complaint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/mine:
    get:
      operationId: listMyComplaints
      tags: [complaints]
      summary: List complaints filed by the authenticated user
      responses:
        "200":
          description: User's complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}/evidence:
    get:
      operationId: listEvidence
      tags: [complaints]
      summary: List evidence files for a complaint
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of evidence items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvidenceItem"
        "404":
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addEvidence
      tags: [complaints]
      summary: Record a new evidence file for a complaint (after object storage upload)
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceInput"
      responses:
        "201":
          description: Evidence recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceItem"
        "404":
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}/status:
    patch:
      operationId: updateComplaintStatus
      tags: [complaints, admin]
      summary: Update complaint status (officer/admin only)
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "400":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}/assign:
    post:
      operationId: assignComplaint
      tags: [complaints, admin]
      summary: Assign an investigation officer to a complaint
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignComplaintInput"
      responses:
        "200":
          description: Assignment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}/notes:
    get:
      operationId: listCaseNotes
      tags: [complaints, admin]
      summary: List case notes for a complaint (officer/admin only)
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of case notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseNote"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addCaseNote
      tags: [complaints, admin]
      summary: Add a case note, visit log, or department response
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseNoteInput"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseNote"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/track/{complaintNumber}:
    get:
      operationId: trackComplaint
      tags: [complaints]
      summary: Track a complaint by its complaint number
      parameters:
        - name: complaintNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Complaint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "404":
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rti:
    post:
      operationId: fileRti
      tags: [rti]
      summary: File a new RTI request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RtiInput"
      responses:
        "201":
          description: RTI request filed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RtiRequest"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rti/{referenceNumber}:
    get:
      operationId: getRti
      tags: [rti]
      summary: Get RTI request by reference number
      parameters:
        - name: referenceNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RTI request details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RtiRequest"
        "404":
          description: RTI not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve a private object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users (admin only)
      parameters:
        - name: role
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users/{userId}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update a user's role (super_admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleInput"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/audit-logs:
    get:
      operationId: listAuditLogs
      tags: [admin]
      summary: List audit logs (admin only)
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogsResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard/complaints:
    get:
      operationId: getDashboardComplaints
      tags: [dashboard]
      summary: Get complaints for the officer's jurisdiction/department dashboard
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: assignedToMe
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard complaint list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardComplaintsResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications for the current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notifications/{notificationId}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    District:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameTa:
          type: string
        code:
          type: string
      required: [id, name, nameTa, code]
    Taluk:
      type: object
      properties:
        id:
          type: integer
        districtId:
          type: integer
        name:
          type: string
        nameTa:
          type: ["string", "null"]
      required: [id, districtId, name]
    Block:
      type: object
      properties:
        id:
          type: integer
        districtId:
          type: integer
        talukId:
          type: ["integer", "null"]
        name:
          type: string
        nameTa:
          type: ["string", "null"]
      required: [id, districtId, name]
    Office:
      type: object
      properties:
        id:
          type: integer
        departmentId:
          type: ["integer", "null"]
        districtId:
          type: ["integer", "null"]
        talukId:
          type: ["integer", "null"]
        name:
          type: string
        nameTa:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
      required: [id, name]
    Ministry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameTa:
          type: ["string", "null"]
        ministerName:
          type: ["string", "null"]
      required: [id, name]
    Department:
      type: object
      properties:
        id:
          type: integer
        ministryId:
          type: ["integer", "null"]
        name:
          type: string
        nameTa:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        secretary:
          type: ["string", "null"]
        commissioner:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
      required: [id, name]
    ComplaintCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameTa:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
      required: [id, name]
    PublicStats:
      type: object
      properties:
        totalComplaints:
          type: integer
        resolved:
          type: integer
        pending:
          type: integer
        underInvestigation:
          type: integer
        totalDistricts:
          type: integer
        totalDepartments:
          type: integer
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        topDistricts:
          type: array
          items:
            $ref: "#/components/schemas/NamedCount"
        topDepartments:
          type: array
          items:
            $ref: "#/components/schemas/NamedCount"
        topCategories:
          type: array
          items:
            $ref: "#/components/schemas/NamedCount"
      required:
        [
          totalComplaints,
          resolved,
          pending,
          underInvestigation,
          totalDistricts,
          totalDepartments,
          byStatus,
          topDistricts,
          topDepartments,
          topCategories,
        ]
    StatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer
      required: [status, count]
    NamedCount:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
      required: [name, count]
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: string
        departmentId:
          type: ["integer", "null"]
        districtId:
          type: ["integer", "null"]
      required: [id, clerkId, role]
    AdminUser:
      type: object
      properties:
        id:
          type: integer
        clerkId:
          type: string
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: string
        departmentId:
          type: ["integer", "null"]
        districtId:
          type: ["integer", "null"]
        createdAt:
          type: string
      required: [id, clerkId, role, createdAt]
    AdminUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        total:
          type: integer
      required: [users, total]
    UpdateUserRoleInput:
      type: object
      properties:
        role:
          type: string
        departmentId:
          type: ["integer", "null"]
        districtId:
          type: ["integer", "null"]
      required: [role]
    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]
        action:
          type: string
        entityType:
          type: ["string", "null"]
        entityId:
          type: ["integer", "null"]
        details:
          type: object
        createdAt:
          type: string
      required: [id, action, createdAt]
    AuditLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        total:
          type: integer
      required: [logs, total]
    DashboardComplaintsResponse:
      type: object
      properties:
        complaints:
          type: array
          items:
            $ref: "#/components/schemas/Complaint"
        total:
          type: integer
        stats:
          $ref: "#/components/schemas/DashboardStats"
      required: [complaints, total]
    DashboardStats:
      type: object
      properties:
        submitted:
          type: integer
        under_review:
          type: integer
        investigation:
          type: integer
        action_taken:
          type: integer
        closed:
          type: integer
        rejected:
          type: integer
      required: [submitted, under_review, investigation, action_taken, closed, rejected]
    UpdateStatusInput:
      type: object
      properties:
