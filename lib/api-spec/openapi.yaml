openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CorruptionFreeTN API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: masterdata
    description: Tamil Nadu administrative master data
  - name: complaints
    description: Complaint operations
  - name: stats
    description: Public statistics
  - name: users
    description: User operations
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: admin
    description: Admin and officer operations
  - name: dashboard
    description: Role-scoped dashboard views
  - name: notifications
    description: In-app notifications
  - name: analytics
    description: Public analytics and transparency data
  - name: search
    description: Advanced complaint search and export
  - name: ai
    description: AI-assisted classification and translation
paths:
  /health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /districts:
    get:
      operationId: listDistricts
      tags: [masterdata]
      summary: List all Tamil Nadu districts
      responses:
        "200":
          description: List of districts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/District"
  /districts/{districtId}/taluks:
    get:
      operationId: listTaluksByDistrict
      tags: [masterdata]
      summary: List taluks in a district
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of taluks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Taluk"
        "404":
          description: District not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /taluks:
    get:
      operationId: listTaluks
      tags: [masterdata]
      summary: List all taluks, optionally filtered by district
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of taluks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Taluk"
  /blocks:
    get:
      operationId: listBlocks
      tags: [masterdata]
      summary: List blocks, optionally filtered by district or taluk
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
        - name: talukId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of blocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Block"
  /offices:
    get:
      operationId: listOffices
      tags: [masterdata]
      summary: List government offices, optionally filtered
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of offices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Office"
  /ministries:
    get:
      operationId: listMinistries
      tags: [masterdata]
      summary: List all ministries
      responses:
        "200":
          description: List of ministries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ministry"
  /departments:
    get:
      operationId: listDepartments
      tags: [masterdata]
      summary: List all government departments
      parameters:
        - name: ministryId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
  /complaint-categories:
    get:
      operationId: listComplaintCategories
      tags: [masterdata]
      summary: List all complaint categories
      responses:
        "200":
          description: List of complaint categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplaintCategory"
  /stats/public:
    get:
      operationId: getPublicStats
      tags: [stats]
      summary: Public transparency statistics
      responses:
        "200":
          description: Public statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStats"
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get the current authenticated user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints:
    get:
      operationId: listComplaints
      tags: [complaints]
      summary: List complaints (public, redacted)
      parameters:
        - name: districtId
          in: query
          required: false
          schema:
            type: integer
        - name: departmentId
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
    post:
      operationId: createComplaint
      tags: [complaints]
      summary: Submit a new complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComplaintInput"
      responses:
        "201":
          description: Complaint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/mine:
    get:
      operationId: listMyComplaints
      tags: [complaints]
      summary: List complaints filed by the authenticated user
      responses:
        "200":
          description: User's complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}:
    get:
      operationId: getComplaintById
      tags: [complaints, admin]
      summary: Get a complaint by ID (officer-scoped, jurisdiction enforced)
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Complaint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}/evidence:
    get:
      operationId: listEvidence
      tags: [complaints]
      summary: List evidence files for a complaint
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of evidence items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvidenceItem"
        "404":
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addEvidence
      tags: [complaints]
      summary: Record a new evidence file for a complaint (after object storage upload)
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvidenceInput"
      responses:
        "201":
          description: Evidence recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvidenceItem"
        "404":
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}/status:
    patch:
      operationId: updateComplaintStatus
      tags: [complaints, admin]
      summary: Update complaint status (officer/admin only)
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "400":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}/assign:
    post:
      operationId: assignComplaint
      tags: [complaints, admin]
      summary: Assign an investigation officer to a complaint
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignComplaintInput"
      responses:
        "200":
          description: Assignment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/{complaintId}/notes:
    get:
      operationId: listCaseNotes
      tags: [complaints, admin]
      summary: List case notes for a complaint (officer/admin only)
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of case notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CaseNote"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addCaseNote
      tags: [complaints, admin]
      summary: Add a case note, visit log, or department response
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseNoteInput"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseNote"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /complaints/track/{complaintNumber}:
    get:
      operationId: trackComplaint
      tags: [complaints]
      summary: Track a complaint by its complaint number
      parameters:
        - name: complaintNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Complaint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
        "404":
          description: Complaint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve a private object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users (admin only)
      parameters:
        - name: role
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users/{userId}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update a user's role (super_admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleInput"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/audit-logs:
    get:
      operationId: listAuditLogs
      tags: [admin]
      summary: List audit logs (admin only)
      parameters:
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogsResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard/complaints:
    get:
      operationId: getDashboardComplaints
      tags: [dashboard]
      summary: Get complaints for the officer's jurisdiction/department dashboard
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: assignedToMe
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard complaint list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardComplaintsResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard/department:
    get:
      operationId: getDepartmentDashboard
      tags: [dashboard]
      summary: Alias of /dashboard/complaints — complaints for the officer's jurisdiction/department
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: priority
          in: query
          required: false
          schema:
            type: string
        - name: assignedToMe
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard complaint list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardComplaintsResponse"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard/officer:
    get:
      operationId: getOfficerDashboard
      tags: [dashboard]
      summary: Summary stats and recent complaints for the current officer
      responses:
        "200":
          description: Officer dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficerDashboardResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /dashboard/assignable-officers:
    get:
      operationId: listAssignableOfficers
      tags: [dashboard]
      summary: List investigation officers available for assignment (accessible to any officer role)
      responses:
        "200":
          description: Assignable investigation officers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignableOfficersResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /complaints/{complaintId}/report:
    post:
      operationId: submitInvestigationReport
      tags: [complaints]
      summary: Submit a final investigation report for a complaint
      parameters:
        - name: complaintId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvestigationReportInput"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestigationReport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /admin/departments:
    get:
      operationId: adminListDepartments
      tags: [admin]
      summary: List all departments (super-admin master data)
      responses:
        "200":
          description: Department list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: adminCreateDepartment
      tags: [admin]
      summary: Create a new department
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "201":
          description: Created department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/departments/{departmentId}:
    patch:
      operationId: adminUpdateDepartment
      tags: [admin]
      summary: Update a department
      parameters:
        - name: departmentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
      responses:
        "200":
          description: Updated department
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: adminDeleteDepartment
      tags: [admin]
      summary: Delete a department
      parameters:
        - name: departmentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /auth/session:
    post:
      operationId: postAuthSession
      tags: [auth]
      summary: Record login event for the authenticated user
      responses:
        "200":
          description: Session recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/districts:
    get:
      operationId: adminListDistricts
      tags: [admin]
      summary: List all districts (super-admin master data)
      responses:
        "200":
          description: District list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminDistrict"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: adminCreateDistrict
      tags: [admin]
      summary: Create a district
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistrictInput"
      responses:
        "201":
          description: Created district
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDistrict"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /admin/districts/{districtId}:
    patch:
      operationId: adminUpdateDistrict
      tags: [admin]
      summary: Update a district
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistrictInput"
      responses:
        "200":
          description: Updated district
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDistrict"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: adminDeleteDistrict
      tags: [admin]
      summary: Delete a district
      parameters:
        - name: districtId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /admin/categories:
    get:
      operationId: adminListCategories
      tags: [admin]
      summary: List all complaint categories (super-admin master data)
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminCategory"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: adminCreateCategory
      tags: [admin]
      summary: Create a complaint category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
