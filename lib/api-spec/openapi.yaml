      properties:
        id:
          type: integer
        ministryId:
          type: ["integer", "null"]
        name:
          type: string
        nameTa:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        secretary:
          type: ["string", "null"]
        commissioner:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
      required: [id, name]
    ComplaintCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameTa:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
      required: [id, name]
