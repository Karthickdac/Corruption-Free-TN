    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    District:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameTa:
          type: string
        code:
          type: string
      required: [id, name, nameTa, code]
    Taluk:
      type: object
      properties:
        id:
          type: integer
        districtId:
          type: integer
        name:
          type: string
        nameTa:
          type: ["string", "null"]
      required: [id, districtId, name]
    Block:
      type: object
      properties:
        id:
          type: integer
        districtId:
          type: integer
        talukId:
          type: ["integer", "null"]
        name:
          type: string
        nameTa:
          type: ["string", "null"]
      required: [id, districtId, name]
    Office:
      type: object
      properties:
        id:
          type: integer
        departmentId:
          type: ["integer", "null"]
        districtId:
          type: ["integer", "null"]
        talukId:
          type: ["integer", "null"]
        name:
          type: string
        nameTa:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        contactEmail:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
      required: [id, name]
